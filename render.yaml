services:
  - type: web
    name: codeberg-auto-sync
    runtime: python
    repo: https://github.com/Newton-ait/codeberg-auto-sync
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: CODEBERG_TOKEN
        sync: false
